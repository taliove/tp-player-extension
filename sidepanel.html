<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=400">
    <title>Teleport Assessment Reviewer</title>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
    <!-- Header -->
    <div class="sp-header">
        <div class="sp-header-left">
            <span id="sp-status-dot" class="sp-status-dot"></span>
            <span id="sp-header-title" class="sp-header-title" title="打开 Teleport 管理页面">Teleport</span>
        </div>
        <div class="sp-header-right">
            <button id="btn-search-toggle" class="sp-icon-btn" title="搜索">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/><line x1="10.5" y1="10.5" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
            <button id="btn-refresh" class="sp-icon-btn" title="刷新">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13 8a5 5 0 11-1.5-3.5M13 2v3h-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button id="btn-settings" class="sp-icon-btn" title="设置">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            </button>
        </div>
    </div>

    <!-- Search bar (hidden by default) -->
    <div id="sp-search-bar" class="sp-search-bar" style="display:none">
        <input id="sp-search-input" class="sp-search-input" type="text" placeholder="搜索候选人、岗位...">
    </div>

    <!-- Filter tabs -->
    <div class="sp-filter-tabs">
        <button class="sp-tab active" data-filter="all">全部</button>
        <button class="sp-tab" data-filter="today">今日</button>
        <button class="sp-tab" data-filter="pending">待审</button>
        <button class="sp-tab" data-filter="tagged">已标记</button>
        <button id="sp-tab-topic" class="sp-tab sp-tab-topic" data-filter="topic">岗位▼</button>
    </div>

    <!-- Topic filter dropdown (hidden by default) -->
    <div id="sp-topic-dropdown" class="sp-topic-dropdown" style="display:none">
        <label class="sp-topic-option">
            <input type="checkbox" value="__all__" checked>
            <span>全部岗位</span>
        </label>
        <div class="sp-topic-divider"></div>
        <div id="sp-topic-list"></div>
    </div>

    <!-- Card list -->
    <div id="sp-card-list" class="sp-card-list">
        <!-- Cards rendered dynamically -->
    </div>

    <!-- States -->
    <div id="sp-loading" class="sp-state" style="display:none">
        <div class="sp-spinner"></div>
        <div class="sp-state-text">加载中...</div>
    </div>

    <div id="sp-empty" class="sp-state" style="display:none">
        <div class="sp-state-text">暂无会话记录</div>
        <button id="btn-empty-refresh" class="sp-state-btn">刷新</button>
    </div>

    <div id="sp-error" class="sp-state" style="display:none">
        <div id="sp-error-text" class="sp-state-text sp-error-text"></div>
        <button id="btn-error-retry" class="sp-state-btn">重试</button>
    </div>

    <div id="sp-unauth" class="sp-state" style="display:none">
        <div class="sp-login-form">
            <div class="sp-login-header">
                <img src="icons/icon128.png" class="sp-login-logo" alt="">
                <div class="sp-login-title">Teleport 机试审阅</div>
            </div>
            <label class="sp-settings-label">服务器地址</label>
            <input type="url" id="sp-login-url" class="sp-settings-input" placeholder="https://teleport.company.com" autocomplete="url">
            <div id="sp-login-url-warning" class="sp-login-warning" style="display:none"></div>
            <label class="sp-settings-label">用户名</label>
            <input type="text" id="sp-login-username" class="sp-settings-input" placeholder="请输入用户名" autocomplete="username">
            <label class="sp-settings-label">密码</label>
            <input type="password" id="sp-login-password" class="sp-settings-input" placeholder="请输入密码" autocomplete="current-password">
            <div id="sp-login-captcha-group" style="display:none">
                <label class="sp-settings-label">验证码</label>
                <div class="sp-login-captcha-row">
                    <input type="text" id="sp-login-captcha" class="sp-settings-input sp-login-captcha-input" placeholder="请输入验证码" autocomplete="off">
                    <div id="sp-login-captcha-spinner" class="sp-login-spinner" style="display:none"></div>
                    <img id="sp-login-captcha-img" class="sp-login-captcha-img" alt="验证码" title="点击刷新" style="display:none">
                </div>
            </div>
            <label class="sp-login-checkbox">
                <input type="checkbox" id="sp-login-remember" checked>
                <span>记住密码</span>
            </label>
            <button id="btn-sp-login" class="sp-settings-save">连接</button>
            <div id="sp-login-error" class="sp-settings-error" style="display:none"></div>
            <div class="sp-login-footer">首次使用？联系管理员获取服务器地址和账号。</div>
        </div>
    </div>

    <!-- Footer -->
    <div id="sp-footer" class="sp-footer" style="display:none">
        <span id="sp-stat-today"></span>
        <span id="sp-stat-pending"></span>
    </div>

    <!-- Settings slide-over panel -->
    <div id="sp-settings" class="sp-settings" style="display:none">
        <div class="sp-settings-header">
            <button id="btn-settings-back" class="sp-settings-back">&larr; 返回</button>
        </div>
        <div class="sp-settings-form">
            <label class="sp-settings-label">服务器地址</label>
            <input type="url" id="sp-settings-url" class="sp-settings-input" placeholder="https://teleport.company.com">

            <label class="sp-settings-label">用户名</label>
            <input type="text" id="sp-settings-username" class="sp-settings-input" placeholder="请输入用户名">

            <label class="sp-settings-label">密码</label>
            <input type="password" id="sp-settings-password" class="sp-settings-input" placeholder="••••••••">

            <button id="btn-sp-settings-save" class="sp-settings-save">保存</button>
            <div id="sp-settings-error" class="sp-settings-error" style="display:none"></div>
            <div id="sp-settings-success" class="sp-settings-success" style="display:none">设置已更新</div>

            <button id="btn-sp-logout" class="sp-settings-logout">退出登录</button>
        </div>
    </div>

    <!-- Card context menu -->
    <div id="sp-context-menu" class="sp-context-menu" style="display:none">
        <button class="sp-menu-item" data-tag="pass">标记通过</button>
        <button class="sp-menu-item" data-tag="fail">标记不通过</button>
        <button class="sp-menu-item" data-tag="pending">标记待定</button>
        <div class="sp-menu-divider"></div>
        <button class="sp-menu-item" data-action="note">添加备注</button>
    </div>

    <script src="js/constants.js"></script>
    <script src="js/shared-utils.js"></script>
    <script src="sidepanel.js"></script>
</body>
</html>
