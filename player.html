<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDP 录屏回放</title>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/player.css">
</head>
<body>
<div id="player-app">
  <!-- Info Bar (replaces menu bar — shows recording meta + back button) -->
  <div id="info-bar">
    <button id="btn-back" class="info-bar-back" title="返回列表">&larr;</button>
    <span id="info-bar-meta"></span>
  </div>
  <!-- Shortcut overlay (toggled by ? key) -->
  <div id="shortcut-overlay" style="display:none">
    <div class="shortcut-overlay-content">
      <div class="shortcut-overlay-title">快捷键</div>
      <div class="shortcut-row"><kbd>Space</kbd><span>暂停 / 播放</span></div>
      <div class="shortcut-row"><kbd>&larr; &rarr;</kbd><span>快退 / 快进 10s</span></div>
      <div class="shortcut-row"><kbd>+ / -</kbd><span>变速</span></div>
      <div class="shortcut-row"><kbd>F</kbd><span>全屏</span></div>
      <div class="shortcut-row"><kbd>?</kbd><span>关闭此面板</span></div>
    </div>
  </div>
  <!-- Verdict Banner (tri-state: idle / progress / result) -->
  <div id="verdict-banner">
    <div id="verdict-idle">
      <button id="btn-ai-analyze" class="verdict-btn-analyze" disabled>数据加载中...</button>
      <div class="verdict-idle-right">
        <div class="verdict-auto-group" id="ai-auto-group">
          <span>自动</span>
          <div class="toggle toggle-sm" id="chk-ai-auto"><div class="toggle-knob"></div></div>
        </div>
        <button id="btn-ai-settings" class="verdict-btn-icon" title="设置">&#9881;</button>
      </div>
    </div>
    <div id="verdict-progress" style="display:none">
      <span class="verdict-spinner"></span>
      <span id="verdict-progress-text">准备中...</span>
      <button id="btn-ai-cancel" class="verdict-btn-cancel">取消</button>
    </div>
    <div id="verdict-result" style="display:none">
      <span id="verdict-badge"></span>
      <span id="verdict-score"></span>
      <span id="verdict-oneliner"></span>
      <button id="verdict-expand" class="verdict-btn-icon" title="展开详情">&#9660;</button>
      <button id="btn-ai-settings-result" class="verdict-btn-icon" title="设置">&#9881;</button>
    </div>
    <div id="verdict-error" style="display:none">
      <span class="verdict-error-text" id="verdict-error-text">分析失败</span>
      <button id="btn-ai-retry" class="verdict-btn-retry">重新分析</button>
      <button id="btn-ai-settings-error" class="verdict-btn-icon" title="设置">&#9881;</button>
    </div>
    <div id="verdict-phases" class="verdict-phases-card" style="display:none"></div>
  </div>
  <!-- AI Settings Modal -->
  <div id="ai-settings-modal" class="settings-modal" style="display:none">
    <div class="settings-modal-content">
      <div class="settings-modal-title">AI 配置</div>
      <div class="ai-settings-form">
        <label class="ai-settings-label">协议</label>
        <div class="ai-settings-radio">
          <label><input type="radio" name="ai-protocol" value="claude" checked> Claude API</label>
          <label><input type="radio" name="ai-protocol" value="openai"> OpenAI 兼容</label>
        </div>
        <label class="ai-settings-label">Endpoint</label>
        <input type="text" id="ai-set-endpoint" class="ai-settings-input" placeholder="https://api.anthropic.com">
        <label class="ai-settings-label">API Key</label>
        <div class="ai-settings-key-row">
          <input type="password" id="ai-set-apikey" class="ai-settings-input" placeholder="sk-...">
          <button id="btn-ai-toggle-key" class="ai-btn-icon">&#128065;</button>
        </div>
        <label class="ai-settings-label">Model</label>
        <input type="text" id="ai-set-model" class="ai-settings-input" placeholder="claude-sonnet-4-6">
        <label class="ai-settings-label">API 超时 (秒)</label>
        <input type="number" id="ai-set-timeout" class="ai-settings-input" min="30" max="300" value="60">
      </div>
      <div class="ai-settings-actions">
        <button id="btn-ai-import" class="ai-btn-secondary">从文件导入</button>
        <button id="btn-ai-test" class="ai-btn-secondary">测试连接</button>
        <input type="file" id="ai-import-file" accept=".json" style="display:none">
      </div>
      <div class="ai-settings-actions" style="margin-top:8px">
        <button id="btn-ai-save-settings" class="ai-btn-primary">保存</button>
        <button id="btn-ai-cancel-settings" class="ai-btn-secondary">关闭</button>
      </div>
    </div>
  </div>
  <!-- Main content: Canvas + Notes Panel -->
  <div id="main-content">
    <!-- Canvas area -->
    <div id="canvas-container">
      <div id="canvas-wrapper">
        <canvas id="player-canvas"></canvas>
      </div>
      <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">正在加载...</div>
        <div id="loading-progress"></div>
      </div>
      <div id="error-overlay" style="display:none">
        <div id="error-icon">&#9888;</div>
        <div id="error-text"></div>
        <button id="error-retry">重试</button>
      </div>
      <div id="action-overlay"></div>
      <div id="shortcut-hint" class="hidden">
        <kbd>Space</kbd> 暂停/播放
        <span class="hint-sep">|</span>
        <kbd>&#8592; &#8594;</kbd> 快退/快进 10s
        <span class="hint-sep">|</span>
        <kbd>+/-</kbd> 变速
      </div>
      <div id="tour-overlay" style="display:none">
        <div id="tour-pill">
          <span id="tour-counter">1/5</span>
          <button id="tour-next" class="tour-btn">下一个</button>
          <button id="tour-exit" class="tour-btn tour-btn-exit">结束导览</button>
        </div>
      </div>
    </div>
    <button id="btn-sidebar-expand" title="展开笔记">&#10094;</button>
    <!-- Notes Panel (simplified sidebar) -->
    <div id="sidebar-resize-handle"></div>
    <div id="sidebar" class="notes-only">
      <div id="sidebar-header">
        <span class="notes-panel-title">笔记</span>
        <button id="btn-sidebar-toggle" class="sidebar-toggle-btn" title="收起笔记">&#10095;</button>
      </div>
      <div id="note-tags">
        <span class="note-tag tag-pass" data-tag="pass">通过</span>
        <span class="note-tag tag-fail" data-tag="fail">淘汰</span>
        <span class="note-tag tag-pending" data-tag="pending">待定</span>
      </div>
      <textarea id="note-text" placeholder="输入评估笔记..."></textarea>
    </div>
  </div>
  <!-- Control bar -->
  <div id="control-bar">
    <div id="controls-row-1">
      <button id="btn-play" title="播放/暂停 (Space)">&#9654;</button>
      <div id="progress-container">
        <div id="ai-marker-track"></div>
        <div id="heatmap-bar"></div>
        <div id="progress-bar">
          <div id="progress-played"></div>
          <div id="progress-handle"></div>
        </div>
        <div id="hover-preview" style="display:none">
          <img id="hover-preview-img" alt="">
          <span id="hover-preview-time"></span>
          <div id="hover-preview-marker" style="display:none"></div>
        </div>
      </div>
      <span id="time-display">00:00 / 00:00</span>
    </div>
    <div id="controls-row-2">
      <div id="speed-group" class="segmented-control">
        <button class="seg-btn active" data-speed="1">1x</button>
        <button class="seg-btn" data-speed="2">2x</button>
        <button class="seg-btn" data-speed="4">4x</button>
        <button class="seg-btn" data-speed="8">8x</button>
        <button class="seg-btn" data-speed="16">16x</button>
      </div>
      <div class="ctrl-separator"></div>
      <div class="toggle-group" id="skip-group">
        <div id="skip-toggle" class="toggle active"><div class="toggle-knob"></div></div>
        <span>跳过静默</span>
      </div>
      <div class="ctrl-separator"></div>
      <button id="btn-tour" class="text-btn" title="导览模式 — 自动播放标记点">导览</button>
      <div class="ctrl-separator"></div>
      <div class="zoom-controls">
        <button id="btn-zoom-out" class="icon-btn" title="缩小">&#8722;</button>
        <span id="zoom-display">100%</span>
        <button id="btn-zoom-in" class="icon-btn" title="放大">+</button>
        <div class="ctrl-separator"></div>
        <button id="btn-fit" class="text-btn active" title="适应窗口">适应</button>
        <button id="btn-original" class="text-btn" title="原始大小">1:1</button>
      </div>
    </div>
    <div id="shortcut-bar">
      <kbd>Space</kbd> 暂停/播放
      <span class="hint-sep">|</span>
      <kbd>&#8592; &#8594;</kbd> 快退/快进 10s
      <span class="hint-sep">|</span>
      <kbd>+/-</kbd> 变速
    </div>
  </div>
  <div id="toast-container"></div>
</div>

<!-- RID is set by player-standalone.js from URL params (inline scripts blocked by CSP) -->

<!-- Scripts: libs -> constants -> modules (app.js loaded dynamically by player-standalone.js) -->
<script src="lib/pako.min.js"></script>
<script src="lib/rle.js"></script>
<script src="js/constants.js"></script>
<script src="js/ext-bridge.js"></script>
<script src="js/shared-utils.js"></script>
<script src="js/ai-settings.js"></script>
<script src="js/prompt-templates.js"></script>
<script src="js/report-cache.js"></script>
<script src="js/ai-analyzer.js"></script>
<script src="js/timeline-markers.js"></script>
<script src="js/tour-mode.js"></script>
<script src="js/host-resolver.js"></script>
<script src="js/cache-manager.js"></script>
<script src="js/downloader.js"></script>
<script src="js/parser.js"></script>
<script src="js/decoder.js"></script>
<script src="js/image-cache.js"></script>
<script src="js/renderer.js"></script>
<script src="js/player.js"></script>
<script src="js/zoom.js"></script>
<script src="js/notes.js"></script>
<script src="js/history.js"></script>
<script src="js/onboarding.js"></script>
<!-- player-standalone.js reads server URL from storage, sets __TP_SERVER, then loads app.js -->
<script src="player-standalone.js"></script>
</body>
</html>
